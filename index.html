<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jugando con DOM</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>

  <body>
    
    <main class="container mt-5">
      <!--row para trabajar con el sistema de columnas y centrado (clase de boostrap)-->
<div class="row text-center">


<!--Para que en dispositivos pequeños no se peguen las tarjetas arriba y abajo (Adaptacion a dispositivos moviles RESPONSIVE)-->
<article class="col-sm-4 mb-3">
  <!--clase de card-body de boostrap -->
  <div class="card">
  <div class="card-body">
<h5 class="card-title" >Frutilla 🍓</h5>
<p class="lead ">$ 300</p>


<!-- Se debe agregar un atributo a cada boton para poder leerlo con javascript, lo que se hace con data.
 Luego en el archivo practicaTemplate.js con el metodo dataset se captura ese valor. -->
 <button class="btn btn-outline-primary" data-fruta="Frutilla" data-precio="300">Agregar</button>
  </div>
    </div>
</article>

<article class="col-sm-4 mb-3">
  <div class="card">
  <div class="card-body">
<h5 class="card-title">Banana 🍌</h5>
<p class="lead ">$ 300</p>
<button class="btn btn-outline-primary"  data-fruta="Banana" data-precio="300">Agregar</button>
  </div>
  </div>
</article>

<article class="col-sm-4 mb-3">
  <div = class="card">  
  <div class="card-body">
<h5 class="card-title">Manzana 🍎</h5>
<p class="lead ">$ 300</p>
<button class="btn btn-outline-primary"  data-fruta="Manzana" data-precio="300">Agregar</button>
  </div>
  </div>
</article>


</div>

    </main>

<section class="container mt-3">
<ul class="list-group" id="carrito"></ul>
</section>


<footer id ="footer"  class="container mt-3">
<template id="templateFooter">
<div class="card">
  <div class="card-body d-flex justify-content-between align-items-center">
    <p class="lead mb-0">Total $<span>1500</span></p>
    <button class="btn btn-outline-info">Finalizar Compra</button>
  </div>
</div>
</template>
</footer>


<template id="template">
  <!-- el LI es el elemento que se repite-->
<li class="list-group-item bg-secondary text-white">
<span class="badge bg-primary rounded-pill align-middle">12</span>
<span class="lead align-middle">Frutilla</span>
</li>
<!--separa los elementos uno a la derecha y el otro a la izquierda con boostrap-->
<li class="list-group-item d-flex justify-content-between align-items-center">
<div>
<p class="lead mb-0">Total: <span>100</span></p>
</div>
<div>
  <button class="btn btn-sm btn-danger">Quitar</button>
    <button class="btn btn-sm btn-success">Agregar</button>

</div>



</li>

</template>

    <script src="practicaTemplate.js"></script>
  </body>
</html>
